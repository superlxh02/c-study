<svg width="900" height="370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2E7D32"/></marker>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="900" height="34" rx="5" fill="#2E7D32"/>
  <text x="450" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">步骤③ 尾插法：遍历找到最后一个节点 —— p 指针沿链表一步步走到末尾</text>

  <!-- ===== Panel 1: 第1轮 ===== -->
  <rect x="8" y="44" width="212" height="310" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="8" y="44" width="212" height="28" rx="8" fill="#F5F5F5"/>
  <rect x="8" y="58" width="212" height="14" fill="#F5F5F5"/>
  <text x="114" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" font-family="sans-serif">帧1 — 第1轮循环</text>

  <rect x="14" y="100" width="36" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="32" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <!-- 节点10（p在此） -->
  <rect x="60" y="92" width="100" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="125" y1="92" x2="125" y2="136" stroke="#2E7D32" stroke-width="1"/>
  <text x="92" y="110" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="92" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">10</text>
  <text x="175" y="110" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="175" y="128" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→20</text>

  <text x="92" y="86" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">p 起点</text>
  <line x1="50" y1="114" x2="57" y2="114" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#a-b)"/>

  <rect x="18" y="158" width="196" height="56" rx="6" fill="#F9FBE7" stroke="#CDDC39" stroke-width="1"/>
  <text x="116" y="178" text-anchor="middle" font-size="10" fill="#333" font-family="sans-serif">p→next == NULL ?</text>
  <text x="116" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F" font-family="sans-serif">p→next = 20 ≠ NULL</text>
  <text x="116" y="210" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">→ 执行 p = p→next</text>

  <text x="114" y="248" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">p 移到节点 20</text>

  <!-- ===== 箭头 ===== -->
  <text x="230" y="199" text-anchor="middle" font-size="18" fill="#4A90D9" font-family="sans-serif">→</text>

  <!-- ===== Panel 2: 第2轮 ===== -->
  <rect x="245" y="44" width="212" height="310" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="245" y="44" width="212" height="28" rx="8" fill="#F5F5F5"/>
  <rect x="245" y="58" width="212" height="14" fill="#F5F5F5"/>
  <text x="351" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" font-family="sans-serif">帧2 — 第2轮循环</text>

  <rect x="250" y="100" width="36" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="268" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <rect x="296" y="92" width="100" height="44" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="361" y1="92" x2="361" y2="136" stroke="#1565C0" stroke-width="0.8"/>
  <text x="328" y="110" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="328" y="128" text-anchor="middle" font-size="11" fill="#999" font-family="sans-serif">10</text>
  <text x="411" y="110" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="411" y="128" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→20</text>

  <line x1="286" y1="114" x2="293" y2="114" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#a-b)"/>

  <!-- 节点20（p在此） -->
  <rect x="316" y="160" width="100" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="381" y1="160" x2="381" y2="204" stroke="#2E7D32" stroke-width="1"/>
  <text x="348" y="178" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="348" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">20</text>
  <text x="431" y="178" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="431" y="196" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→30</text>

  <text x="348" y="154" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">p 在此</text>

  <rect x="252" y="225" width="198" height="56" rx="6" fill="#F9FBE7" stroke="#CDDC39" stroke-width="1"/>
  <text x="351" y="245" text-anchor="middle" font-size="10" fill="#333" font-family="sans-serif">p→next == NULL ?</text>
  <text x="351" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F" font-family="sans-serif">p→next = 30 ≠ NULL</text>
  <text x="351" y="277" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">→ 执行 p = p→next</text>

  <!-- ===== 箭头 ===== -->
  <text x="467" y="199" text-anchor="middle" font-size="18" fill="#4A90D9" font-family="sans-serif">→</text>

  <!-- ===== Panel 3: 第3轮 ===== -->
  <rect x="482" y="44" width="212" height="310" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="482" y="44" width="212" height="28" rx="8" fill="#F5F5F5"/>
  <rect x="482" y="58" width="212" height="14" fill="#F5F5F5"/>
  <text x="588" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="#555" font-family="sans-serif">帧3 — 第3轮循环</text>

  <rect x="488" y="100" width="36" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="506" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <rect x="534" y="92" width="100" height="44" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="599" y1="92" x2="599" y2="136" stroke="#1565C0" stroke-width="0.8"/>
  <text x="566" y="110" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="566" y="128" text-anchor="middle" font-size="11" fill="#999" font-family="sans-serif">10</text>
  <text x="649" y="110" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="649" y="128" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→20</text>

  <!-- 节点30（p在此） -->
  <rect x="554" y="160" width="100" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="619" y1="160" x2="619" y2="204" stroke="#2E7D32" stroke-width="1"/>
  <text x="586" y="178" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="586" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">30</text>
  <text x="669" y="178" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="669" y="196" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">NULL</text>

  <text x="586" y="154" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">p 在此</text>
  <line x1="524" y1="114" x2="531" y2="114" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#a-b)"/>

  <rect x="488" y="225" width="200" height="56" rx="6" fill="#F9FBE7" stroke="#CDDC39" stroke-width="1"/>
  <text x="588" y="245" text-anchor="middle" font-size="10" fill="#333" font-family="sans-serif">p→next == NULL ?</text>
  <text x="588" y="263" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F" font-family="sans-serif">p→next = NULL? 继续循环?</text>
  <text x="588" y="277" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">条件不成立...</text>

  <!-- ===== 箭头 ===== -->
  <text x="704" y="199" text-anchor="middle" font-size="18" fill="#2E7D32" font-family="sans-serif">→</text>

  <!-- ===== Panel 4: 结果 ===== -->
  <rect x="718" y="44" width="174" height="310" rx="8" fill="#F1F8E9" stroke="#2E7D32" stroke-width="2"/>
  <rect x="718" y="44" width="174" height="28" rx="8" fill="#2E7D32"/>
  <rect x="718" y="58" width="174" height="14" fill="#2E7D32"/>
  <text x="805" y="74" text-anchor="middle" font-size="11" font-weight="bold" fill="white" font-family="sans-serif">帧4 — 循环结束</text>

  <rect x="724" y="100" width="36" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="742" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <rect x="770" y="92" width="105" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="838" y1="92" x2="838" y2="136" stroke="#2E7D32" stroke-width="1"/>
  <text x="802" y="110" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="802" y="128" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">30</text>
  <text x="890" y="110" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="890" y="128" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">NULL</text>

  <text x="802" y="86" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">p 在末尾</text>
  <line x1="760" y1="114" x2="767" y2="114" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#a-b)"/>

  <rect x="726" y="160" width="158" height="70" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="805" y="180" text-anchor="middle" font-size="10" fill="#2E7D32" font-family="sans-serif">p→next == NULL</text>
  <text x="805" y="198" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32" font-family="sans-serif">✓ 条件成立</text>
  <text x="805" y="217" text-anchor="middle" font-size="10" fill="#2E7D32" font-family="sans-serif">循环停止！</text>

  <text x="805" y="262" text-anchor="middle" font-size="10" fill="#555" font-family="sans-serif">p 已在尾节点</text>
  <text x="805" y="282" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">可以执行步骤④</text>
</svg>
