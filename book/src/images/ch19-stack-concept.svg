<svg width="500" height="350" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">栈的直观理解 — 像一叠盘子</text>

  <!-- 盘子栈 -->
  <!-- 底部盘子 -->
  <ellipse cx="250" cy="275" rx="100" ry="18" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="150" y="245" width="200" height="30" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="250" cy="245" rx="100" ry="18" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="263" text-anchor="middle" font-size="12" fill="#333">第一个放入 (最底)</text>

  <!-- 中间盘子 -->
  <ellipse cx="250" cy="226" rx="100" ry="18" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="150" y="196" width="200" height="30" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>
  <ellipse cx="250" cy="196" rx="100" ry="18" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="250" y="214" text-anchor="middle" font-size="12" fill="#333">第二个放入</text>

  <!-- 顶部盘子 -->
  <ellipse cx="250" cy="177" rx="100" ry="18" fill="#90CAF9" stroke="#0D47A1" stroke-width="2"/>
  <rect x="150" y="147" width="200" height="30" fill="#90CAF9" stroke="#0D47A1" stroke-width="2"/>
  <ellipse cx="250" cy="147" rx="100" ry="18" fill="#E3F2FD" stroke="#0D47A1" stroke-width="2"/>
  <text x="250" y="165" text-anchor="middle" font-size="12" fill="#0D47A1">最后放入 (最先取出) ← 栈顶</text>

  <!-- 箭头 -->
  <line x1="370" y1="160" x2="430" y2="160" stroke="#D32F2F" stroke-width="2" marker-end="url(#stack-arr)"/>
  <text x="435" y="165" font-size="11" fill="#D32F2F">入栈/出栈</text>
  <text x="435" y="180" font-size="11" fill="#D32F2F">都在栈顶进行</text>

  <defs>
    <marker id="stack-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>
</svg>
