<svg width="700" height="140" xmlns="http://www.w3.org/2000/svg">
  <text x="350" y="22" text-anchor="middle" font-size="15" font-weight="bold" fill="#333">内存信箱模型：每个地址对应 1 字节</text>

  <!-- 地址标尺 -->
  <text x="62" y="48" text-anchor="middle" font-size="11" fill="#888">地址 →</text>
  <text x="132" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">0</text>
  <text x="207" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">1</text>
  <text x="282" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">2</text>
  <text x="357" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">3</text>
  <text x="432" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">4</text>
  <text x="507" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">5</text>
  <text x="582" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">6</text>
  <text x="657" y="48" text-anchor="middle" font-size="11" font-weight="bold" fill="#555">7</text>

  <!-- 信箱格子 -->
  <rect x="40" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="75" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="115" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="150" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="190" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="225" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="265" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="300" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="340" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="375" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="415" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="450" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="490" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="525" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <rect x="565" y="58" width="70" height="44" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="600" y="84" text-anchor="middle" font-size="11" fill="#888">1 字节</text>

  <!-- 省略号 -->
  <text x="660" y="84" text-anchor="middle" font-size="18" fill="#999">...</text>

  <!-- 底部说明 -->
  <text x="350" y="128" text-anchor="middle" font-size="12" fill="#666">内存就是一排从 0 开始编号的信箱，每个信箱恰好存放 1 个字节</text>
</svg>
