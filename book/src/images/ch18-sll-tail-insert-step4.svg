  <text x="435" y="278" text-anchor="middle" font-size="9" fill="#D32F2F" font-family="sans-serif">NULL</text>

  <text x="470" y="272" font-size="9" fill="#D32F2F" font-family="sans-serif">←newNode</text>

  <text x="431" y="315" text-anchor="middle" font-size="9" fill="#D32F2F" font-family="sans-serif">把 newNode 地址写入 p→next</text>

  <!-- ===== 箭头 ===== -->
  <text x="575" y="199" text-anchor="middle" font-size="22" fill="#2E7D32" font-family="sans-serif">→</text>

