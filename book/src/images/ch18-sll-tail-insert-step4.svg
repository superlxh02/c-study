  <!-- 标题 -->
  <rect x="0" y="0" width="840" height="34" rx="5" fill="#D32F2F"/>
  <text x="420" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">步骤④ 尾插法：p→next = newNode —— 将尾节点的 next 从 NULL 改为指向新节点</text>

  <!-- ===== Panel 1: 操作前 ===== -->
  <rect x="10" y="44" width="262" height="310" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
