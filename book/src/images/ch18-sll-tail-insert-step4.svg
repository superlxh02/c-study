  <text x="185" y="110" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="185" y="128" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→</text>

  <line x1="52" y1="114" x2="59" y2="114" stroke="#4A90D9" stroke-width="1.5" marker-end="url(#a-b)"/>

  <!-- 尾节点 p -->
  <rect x="75" y="158" width="110" height="46" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
