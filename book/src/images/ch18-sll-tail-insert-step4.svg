  <text x="110" y="152" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">p (尾节点)</text>

  <text x="141" y="248" text-anchor="middle" font-size="10" fill="#888" font-family="sans-serif">p→next == NULL</text>
  <text x="141" y="268" text-anchor="middle" font-size="10" fill="#888" font-family="sans-serif">表示链表在此结束</text>
  <text x="141" y="300" text-anchor="middle" font-size="9" fill="#aaa" font-family="sans-serif">（步骤③已找到 p）</text>

