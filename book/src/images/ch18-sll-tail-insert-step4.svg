  <text x="676" y="128" text-anchor="middle" font-size="10" fill="#999" font-family="sans-serif">...</text>
  <text x="759" y="110" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="759" y="128" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→</text>

