  <rect x="16" y="100" width="36" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="34" y="118" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

