<svg width="550" height="340" xmlns="http://www.w3.org/2000/svg">
  <text x="275" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">环形队列 — 将数组视为一个环</text>

  <!-- 环形表示 -->
  <circle cx="275" cy="175" r="95" fill="none" stroke="#1565C0" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- 数组格子沿弧线排列 -->
  <!-- [0] -->
  <rect x="170" y="85" width="55" height="35" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="197" y="108" text-anchor="middle" font-size="11" fill="#333">60</text>
  <text x="197" y="80" text-anchor="middle" font-size="8" fill="#888">[0]</text>

  <!-- [1] -->
  <rect x="245" y="75" width="55" height="35" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="272" y="98" text-anchor="middle" font-size="11" fill="#333">70</text>
  <text x="272" y="70" text-anchor="middle" font-size="8" fill="#888">[1]</text>

  <!-- [2] -->
  <rect x="320" y="85" width="55" height="35" rx="4" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="347" y="108" text-anchor="middle" font-size="10" fill="#BDBDBD">空</text>
  <text x="347" y="80" text-anchor="middle" font-size="8" fill="#888">[2]</text>

  <!-- [3] -->
  <rect x="335" y="150" width="55" height="35" rx="4" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5"/>
  <text x="362" y="173" text-anchor="middle" font-size="10" fill="#BDBDBD">空</text>
  <text x="362" y="145" text-anchor="middle" font-size="8" fill="#888">[3]</text>

  <!-- [4] -->
  <rect x="295" y="215" width="55" height="35" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="322" y="238" text-anchor="middle" font-size="11" fill="#D32F2F">30</text>
  <text x="322" y="210" text-anchor="middle" font-size="8" fill="#D32F2F">[4] front</text>

  <!-- [5] -->
  <rect x="215" y="235" width="55" height="35" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="242" y="258" text-anchor="middle" font-size="11" fill="#333">40</text>
  <text x="242" y="230" text-anchor="middle" font-size="8" fill="#888">[5]</text>

  <!-- [6] -->
  <rect x="155" y="215" width="55" height="35" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="182" y="238" text-anchor="middle" font-size="11" fill="#2E7D32">50</text>
  <text x="182" y="210" text-anchor="middle" font-size="8" fill="#2E7D32">[6] rear</text>

  <text x="275" y="320" text-anchor="middle" font-size="11" fill="#555">所有下标移动都用取模运算：(index + 1) % MAX_SIZE</text>
</svg>
