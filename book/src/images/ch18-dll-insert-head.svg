<svg width="680" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="db2-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>

  <text x="340" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">双链表头插法 — 插入前</text>

  <!-- head -->
  <rect x="10" y="45" width="50" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="35" y="80" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">head</text>

  <!-- 旧链表只有一个节点示意 -->
  <rect x="120" y="45" width="150" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="195" y="80" text-anchor="middle" font-size="13" fill="#333">10 (旧头节点)</text>
  <text x="240" y="45" text-anchor="middle" font-size="9" fill="#888">NULL</text>

  <!-- 新节点 -->
  <rect x="420" y="45" width="150" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="495" y="80" text-anchor="middle" font-size="13" fill="#D32F2F">new: 5</text>
  <text x="495" y="30" text-anchor="middle" font-size="10" fill="#D32F2F">待插入的新节点</text>

  <!-- 分割线 -->
  <line x1="20" y1="165" x2="660" y2="165" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="340" y="185" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">插入后 — 步骤①和步骤②</text>

  <rect x="10" y="200" width="50" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="35" y="235" text-anchor="middle" font-size="12" font-weight="bold" fill="#D32F2F">head</text>

  <!-- 新节点 -->
  <rect x="90" y="200" width="150" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="165" y="235" text-anchor="middle" font-size="13" fill="#D32F2F">5 (新头节点)</text>
  <text x="210" y="200" text-anchor="middle" font-size="9" fill="#888">NULL ← prev</text>

  <!-- 旧节点 -->
  <rect x="300" y="200" width="150" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="375" y="235" text-anchor="middle" font-size="13" fill="#333">10</text>

  <!-- next 箭头 5→10 -->
  <line x1="240" y1="220" x2="295" y2="220" stroke="#D32F2F" stroke-width="2" marker-end="url(#db2-arr)"/>
  <text x="267" y="213" text-anchor="middle" font-size="10" fill="#D32F2F">① next</text>

  <!-- prev 箭头 10→5 -->
  <line x1="295" y1="245" x2="240" y2="245" stroke="#E65100" stroke-width="2" marker-end="url(#db2-arr)"/>
  <text x="267" y="260" text-anchor="middle" font-size="10" fill="#E65100">② prev</text>

  <text x="340" y="310" text-anchor="middle" font-size="11" fill="#888">①新节点.next = 旧头节点  ②旧头节点.prev = 新节点</text>
</svg>
