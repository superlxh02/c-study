<svg width="680" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arr4" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
  </defs>

  <text x="340" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">尾插法 — 插入前：先找到最后一个节点</text>

  <!-- head -->
  <rect x="20" y="40" width="50" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="45" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">head</text>
  <line x1="70" y1="70" x2="110" y2="70" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="115" y="40" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="175" y="75" text-anchor="middle" font-size="13" fill="#333">10</text>
  <line x1="235" y1="70" x2="275" y2="70" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="280" y="40" width="120" height="60" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="340" y="75" text-anchor="middle" font-size="13" fill="#333">20</text>
  <text x="380" y="40" text-anchor="middle" font-size="10" fill="#2E7D32">NULL ← 尾节点</text>

  <!-- 遍历指针 p -->
  <text x="460" y="55" font-size="11" fill="#2E7D32">指针 p 从头走到尾</text>
  <text x="460" y="72" font-size="10" fill="#888">p = p→next 不断前进</text>

  <!-- 新节点 -->
  <rect x="460" y="95" width="120" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="520" y="130" text-anchor="middle" font-size="13" fill="#E65100">new: 30</text>

  <!-- 分割线 -->
  <line x1="30" y1="200" x2="650" y2="200" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="340" y="220" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">尾插法 — 插入后：尾节点指向新节点</text>

  <rect x="20" y="230" width="50" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="45" y="265" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">head</text>
  <line x1="70" y1="260" x2="110" y2="260" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="115" y="230" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="175" y="265" text-anchor="middle" font-size="13" fill="#333">10</text>
  <line x1="235" y1="260" x2="275" y2="260" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr3)"/>

  <rect x="280" y="230" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="340" y="265" text-anchor="middle" font-size="13" fill="#333">20</text>
  <line x1="400" y1="260" x2="440" y2="260" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr4)"/>

  <rect x="445" y="230" width="120" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="505" y="265" text-anchor="middle" font-size="13" fill="#E65100">30</text>
  <text x="545" y="230" text-anchor="middle" font-size="10" fill="#E65100">NULL</text>

  <text x="340" y="310" text-anchor="middle" font-size="11" fill="#888">新节点 30 挂在原尾节点 20 的后面，成为新的尾节点</text>
</svg>
