<svg width="840" height="370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/></marker>
    <marker id="a-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#D32F2F"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2E7D32"/></marker>
    <marker id="a-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#BDBDBD"/></marker>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="840" height="34" rx="5" fill="#D32F2F"/>
  <text x="420" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">步骤④ 删除非头节点：p→next = temp→next —— 前驱"绕过"目标节点</text>

  <!-- ===== Panel 1: 赋值前 ===== -->
  <rect x="10" y="44" width="262" height="310" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="10" y="44" width="262" height="30" rx="8" fill="#F5F5F5"/>
  <rect x="10" y="58" width="262" height="16" fill="#F5F5F5"/>
  <text x="141" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#555" font-family="sans-serif">帧1 — 操作前</text>

  <!-- head -->
  <rect x="16" y="102" width="38" height="26" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="35" y="119" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>
  <line x1="54" y1="115" x2="68" y2="115" stroke="#4A90D9" stroke-width="1.3" marker-end="url(#a-b)"/>

  <!-- p（前驱） -->
  <rect x="73" y="94" width="105" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="143" y1="94" x2="143" y2="138" stroke="#2E7D32" stroke-width="1"/>
  <text x="108" y="112" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="108" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">10</text>
  <text x="196" y="112" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="196" y="132" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→20</text>

  <text x="108" y="88" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">p (前驱)</text>

  <!-- temp（目标） -->
  <rect x="100" y="158" width="105" height="44" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <line x1="170" y1="158" x2="170" y2="202" stroke="#D32F2F" stroke-width="1"/>
  <text x="135" y="176" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="135" y="196" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F" font-family="sans-serif">20</text>
  <text x="223" y="176" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="223" y="196" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→30</text>

  <text x="135" y="152" text-anchor="middle" font-size="8" fill="#D32F2F" font-family="sans-serif">temp (目标)</text>

  <!-- 指针值说明 -->
  <rect x="18" y="222" width="240" height="44" rx="5" fill="#FFF8E1" stroke="#FFB300" stroke-width="0.8"/>
  <text x="138" y="239" text-anchor="middle" font-size="9" fill="#555" font-family="sans-serif">p→next = 节点20的地址</text>
  <text x="138" y="256" text-anchor="middle" font-size="9" fill="#555" font-family="sans-serif">temp→next = 节点30的地址</text>

  <text x="141" y="300" text-anchor="middle" font-size="8" fill="#888" font-family="sans-serif">（步骤③已暂存 temp = p→next）</text>

  <!-- ===== 箭头 ===== -->
  <text x="285" y="199" text-anchor="middle" font-size="22" fill="#4A90D9" font-family="sans-serif">→</text>

  <!-- ===== Panel 2: 赋值 ===== -->
  <rect x="300" y="44" width="262" height="310" rx="8" fill="#FFF8F0" stroke="#E65100" stroke-width="2"/>
  <rect x="300" y="44" width="262" height="30" rx="8" fill="#E65100"/>
  <rect x="300" y="58" width="262" height="16" fill="#E65100"/>
  <text x="431" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">帧2 — 执行赋值</text>

  <rect x="306" y="102" width="38" height="26" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="325" y="119" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>
  <line x1="344" y1="115" x2="358" y2="115" stroke="#4A90D9" stroke-width="1.3" marker-end="url(#a-b)"/>

  <!-- p -->
  <rect x="363" y="94" width="105" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="433" y1="94" x2="433" y2="138" stroke="#2E7D32" stroke-width="1"/>
  <text x="398" y="112" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="398" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">10</text>
  <text x="486" y="112" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="486" y="132" text-anchor="middle" font-size="8" fill="#D32F2F" font-family="sans-serif">?</text>

  <text x="398" y="88" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">p</text>

  <!-- temp 被灰掉 -->
  <rect x="390" y="158" width="105" height="44" rx="5" fill="#FFF5F5" stroke="#EF9A9A" stroke-width="1.8"/>
  <line x1="460" y1="158" x2="460" y2="202" stroke="#EF9A9A" stroke-width="0.8"/>
  <text x="425" y="176" text-anchor="middle" font-size="9" fill="#999" font-family="sans-serif">data</text>
  <text x="425" y="196" text-anchor="middle" font-size="11" fill="#D32F2F" font-family="sans-serif">20</text>
  <text x="513" y="176" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="513" y="196" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">→30</text>

  <text x="425" y="152" text-anchor="middle" font-size="8" fill="#D32F2F" font-family="sans-serif">temp</text>

  <!-- 红色赋值 -->
  <path d="M 398 142 C 398 212, 513 212, 513 208" stroke="#D32F2F" stroke-width="2.5" fill="none" stroke-dasharray="8,3" marker-end="url(#a-r)"/>
  <text x="455" y="242" text-anchor="middle" font-size="9" font-weight="bold" fill="#D32F2F" font-family="sans-serif">p→next = temp→next</text>
  <text x="455" y="260" text-anchor="middle" font-size="8" fill="#555" font-family="sans-serif">把节点30地址写入p→next</text>

  <text x="431" y="305" text-anchor="middle" font-size="8" fill="#E65100" font-family="sans-serif">p→next 从 20 改为 30</text>

  <!-- ===== 箭头 ===== -->
  <text x="575" y="199" text-anchor="middle" font-size="22" fill="#2E7D32" font-family="sans-serif">→</text>

  <!-- ===== Panel 3: 结果 ===== -->
  <rect x="590" y="44" width="240" height="310" rx="8" fill="#F1F8E9" stroke="#2E7D32" stroke-width="2"/>
  <rect x="590" y="44" width="240" height="30" rx="8" fill="#2E7D32"/>
  <rect x="590" y="58" width="240" height="16" fill="#2E7D32"/>
  <text x="710" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">帧3 — 结果</text>

  <rect x="596" y="102" width="38" height="26" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.3"/>
  <text x="615" y="119" text-anchor="middle" font-size="8" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>
  <line x1="634" y1="115" x2="648" y2="115" stroke="#4A90D9" stroke-width="1.3" marker-end="url(#a-b)"/>

  <!-- p -->
  <rect x="653" y="94" width="105" height="44" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="723" y1="94" x2="723" y2="138" stroke="#2E7D32" stroke-width="1"/>
  <text x="688" y="112" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="688" y="132" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">10</text>
  <text x="776" y="112" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="776" y="132" text-anchor="middle" font-size="8" fill="#2E7D32" font-family="sans-serif">→30</text>

  <!-- 绕过的目标 -->
  <rect x="660" y="168" width="90" height="30" rx="4" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="705" y="183" text-anchor="middle" font-size="9" fill="#BDBDBD" font-family="sans-serif">20 (已绕开)</text>
  <text x="705" y="197" text-anchor="middle" font-size="8" fill="#BDBDBD" font-family="sans-serif">随后 free</text>

  <!-- 节点30 -->
  <rect x="674" y="215" width="100" height="44" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.2"/>
  <line x1="739" y1="215" x2="739" y2="259" stroke="#1565C0" stroke-width="0.8"/>
  <text x="704" y="233" text-anchor="middle" font-size="9" fill="#666" font-family="sans-serif">data</text>
  <text x="704" y="253" text-anchor="middle" font-size="11" fill="#333" font-family="sans-serif">30</text>
  <text x="789" y="233" text-anchor="middle" font-size="8" fill="#999" font-family="sans-serif">next</text>
  <text x="789" y="253" text-anchor="middle" font-size="8" fill="#888" font-family="sans-serif">NULL</text>

  <!-- 绕过弧线 -->
  <path d="M 688 142 C 688 162, 704 182, 704 212" stroke="#2E7D32" stroke-width="2.2" fill="none" marker-end="url(#a-g)"/>

  <text x="710" y="305" text-anchor="middle" font-size="10" fill="#2E7D32" font-family="sans-serif">10 → 30  ✓  删除完成</text>
</svg>
