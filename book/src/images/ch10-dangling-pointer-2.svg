<svg width="920" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#2E7D32"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 10 4, 0 8" fill="#E53935"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#757575"/>
    </marker>
  </defs>

  <text x="460" y="28" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">情况二：多个指针指向同一块内存，一个释放后另一个悬空</text>

  <!-- 左：释放前 -->
  <rect x="20" y="50" width="390" height="210" rx="10" fill="#F1F8E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="215" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#2E7D32">释放前 — 两个指针指向同一块内存</text>
  <line x1="40" y1="90" x2="390" y2="90" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="55" y="108" width="160" height="36" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="135" y="131" text-anchor="middle" font-size="13" font-family="monospace" fill="#333">owner = 0xB800</text>

  <rect x="240" y="108" width="160" height="36" rx="4" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="320" y="131" text-anchor="middle" font-size="13" font-family="monospace" fill="#333">alias = 0xB800</text>

  <rect x="105" y="165" width="210" height="72" rx="6" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="210" y="192" text-anchor="middle" font-size="14" fill="#333">堆内存 0xB800</text>
  <text x="210" y="214" text-anchor="middle" font-size="12" fill="#333">值 = 100 ✓ 可用</text>

  <line x1="135" y1="144" x2="160" y2="165" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <line x1="320" y1="144" x2="285" y2="165" stroke="#2E7D32" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- 中间分隔 -->
  <line x1="415" y1="50" x2="415" y2="260" stroke="#BDBDBD" stroke-width="2.5" stroke-dasharray="8,4"/>
  <text x="430" y="150" text-anchor="start" font-size="14" font-weight="bold" fill="#E53935">free(owner);</text>
  <text x="430" y="174" text-anchor="start" font-size="14" font-weight="bold" fill="#E53935">owner = NULL;</text>
  <line x1="420" y1="185" x2="465" y2="185" stroke="#E53935" stroke-width="3" marker-end="url(#arrowRed)"/>

  <!-- 右：释放后 -->
  <rect x="480" y="50" width="420" height="210" rx="10" fill="#FFF3F0" stroke="#E53935" stroke-width="2"/>
  <text x="690" y="80" text-anchor="middle" font-size="15" font-weight="bold" fill="#E53935">释放后 — alias 成了悬空指针</text>
  <line x1="500" y1="90" x2="880" y2="90" stroke="#E53935" stroke-width="1" stroke-dasharray="4,3"/>

  <rect x="500" y="108" width="180" height="36" rx="4" fill="#FFCDD2" stroke="#E53935" stroke-width="1"/>
  <text x="590" y="131" text-anchor="middle" font-size="13" font-family="monospace" fill="#D32F2F">owner = NULL ✓</text>

  <rect x="690" y="108" width="195" height="36" rx="4" fill="#FF8A80" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="787" y="131" text-anchor="middle" font-size="13" font-family="monospace" fill="#FFF" font-weight="bold">alias = 0xB800 ⚠</text>

  <rect x="560" y="165" width="240" height="72" rx="6" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="680" y="192" text-anchor="middle" font-size="14" fill="#D32F2F">内存已归还，内容未知</text>
  <text x="680" y="214" text-anchor="middle" font-size="12" fill="#D32F2F">可能已被系统复用 ✗</text>

  <line x1="765" y1="144" x2="715" y2="165" stroke="#E53935" stroke-width="2.5" marker-end="url(#arrowRed)" stroke-dasharray="4,2"/>

</svg>
