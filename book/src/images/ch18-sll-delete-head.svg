<svg width="840" height="370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="a-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#4A90D9"/></marker>
    <marker id="a-r" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#D32F2F"/></marker>
    <marker id="a-g" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2E7D32"/></marker>
  </defs>

  <!-- 标题 -->
  <rect x="0" y="0" width="840" height="34" rx="5" fill="#D32F2F"/>
  <text x="420" y="23" text-anchor="middle" font-size="14" font-weight="bold" fill="white" font-family="sans-serif">情形A：删除头节点 —— temp 暂存 → free(head) → head = temp</text>

  <!-- ===== Panel 1: 暂存 ===== -->
  <rect x="10" y="44" width="262" height="310" rx="8" fill="#FAFAFA" stroke="#E0E0E0" stroke-width="1.5"/>
  <rect x="10" y="44" width="262" height="30" rx="8" fill="#F5F5F5"/>
  <rect x="10" y="58" width="262" height="16" fill="#F5F5F5"/>
  <text x="141" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="#555" font-family="sans-serif">帧1 — 暂存下一个节点</text>

  <rect x="14" y="102" width="40" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="34" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <!-- 节点10（要删的） -->
  <rect x="64" y="94" width="115" height="46" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.2"/>
  <line x1="136" y1="94" x2="136" y2="140" stroke="#D32F2F" stroke-width="1"/>
  <text x="100" y="112" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">data</text>
  <text x="100" y="132" text-anchor="middle" font-size="12" font-weight="bold" fill="#D32F2F" font-family="sans-serif">10</text>
  <text x="194" y="112" text-anchor="middle" font-size="9" fill="#999" font-family="sans-serif">next</text>
  <text x="194" y="132" text-anchor="middle" font-size="9" fill="#555" font-family="sans-serif">→20</text>

  <text x="100" y="88" text-anchor="middle" font-size="8" fill="#D32F2F" font-family="sans-serif">要删的头节点</text>
  <line x1="54" y1="116" x2="61" y2="116" stroke="#D32F2F" stroke-width="1.8" marker-end="url(#a-r)"/>

  <!-- 节点20 -->
  <rect x="80" y="165" width="115" height="46" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.3"/>
  <line x1="152" y1="165" x2="152" y2="211" stroke="#1565C0" stroke-width="0.8"/>
  <text x="116" y="183" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">data</text>
  <text x="116" y="203" text-anchor="middle" font-size="12" fill="#333" font-family="sans-serif">20</text>
  <text x="210" y="183" text-anchor="middle" font-size="9" fill="#999" font-family="sans-serif">next</text>
  <text x="210" y="203" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">NULL</text>

  <!-- temp记录 -->
  <text x="116" y="159" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">temp 记住此地址</text>
  <line x1="116" y1="162" x2="116" y2="165" stroke="#2E7D32" stroke-width="1.2"/>

  <text x="141" y="260" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F" font-family="sans-serif">temp = head→next</text>
  <text x="141" y="285" text-anchor="middle" font-size="9" fill="#555" font-family="sans-serif">把节点20地址存入 temp</text>
  <text x="141" y="308" text-anchor="middle" font-size="8" fill="#888" font-family="sans-serif">⚠ 必须先记下再释放！</text>

  <!-- ===== 箭头 ===== -->
  <text x="285" y="199" text-anchor="middle" font-size="22" fill="#4A90D9" font-family="sans-serif">→</text>

  <!-- ===== Panel 2: 释放 ===== -->
  <rect x="300" y="44" width="262" height="310" rx="8" fill="#FFF8F0" stroke="#E65100" stroke-width="2"/>
  <rect x="300" y="44" width="262" height="30" rx="8" fill="#E65100"/>
  <rect x="300" y="58" width="262" height="16" fill="#E65100"/>
  <text x="431" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">帧2 — 释放头节点</text>

  <rect x="304" y="102" width="40" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="324" y="120" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <!-- 节点10（已被释放） -->
  <rect x="354" y="94" width="115" height="46" rx="5" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.2" stroke-dasharray="4,3"/>
  <line x1="426" y1="94" x2="426" y2="140" stroke="#BDBDBD" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="396" y="112" text-anchor="middle" font-size="10" fill="#BDBDBD" font-family="sans-serif">data</text>
  <text x="396" y="132" text-anchor="middle" font-size="11" fill="#BDBDBD" font-family="sans-serif">10</text>
  <text x="484" y="112" text-anchor="middle" font-size="9" fill="#BDBDBD" font-family="sans-serif">next</text>
  <text x="484" y="132" text-anchor="middle" font-size="8" fill="#BDBDBD" font-family="sans-serif">?</text>

  <text x="396" y="158" text-anchor="middle" font-size="10" fill="#D32F2F" font-family="sans-serif">已 free! ← 悬空</text>

  <line x1="344" y1="116" x2="351" y2="116" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- 节点20 -->
  <rect x="370" y="185" width="115" height="46" rx="5" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.3"/>
  <line x1="442" y1="185" x2="442" y2="231" stroke="#1565C0" stroke-width="0.8"/>
  <text x="406" y="203" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">data</text>
  <text x="406" y="223" text-anchor="middle" font-size="12" fill="#333" font-family="sans-serif">20</text>
  <text x="500" y="203" text-anchor="middle" font-size="9" fill="#999" font-family="sans-serif">next</text>
  <text x="500" y="223" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">NULL</text>

  <text x="406" y="179" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">temp 仍指向 20</text>

  <text x="431" y="278" text-anchor="middle" font-size="11" font-weight="bold" fill="#D32F2F" font-family="sans-serif">free(head)</text>
  <text x="431" y="302" text-anchor="middle" font-size="9" fill="#555" font-family="sans-serif">释放节点10的内存</text>

  <!-- ===== 箭头 ===== -->
  <text x="575" y="199" text-anchor="middle" font-size="22" fill="#2E7D32" font-family="sans-serif">→</text>

  <!-- ===== Panel 3: 新head ===== -->
  <rect x="590" y="44" width="240" height="310" rx="8" fill="#F1F8E9" stroke="#2E7D32" stroke-width="2"/>
  <rect x="590" y="44" width="240" height="30" rx="8" fill="#2E7D32"/>
  <rect x="590" y="58" width="240" height="16" fill="#2E7D32"/>
  <text x="710" y="76" text-anchor="middle" font-size="12" font-weight="bold" fill="white" font-family="sans-serif">帧3 — 新头节点就位</text>

  <rect x="596" y="110" width="40" height="28" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="616" y="128" text-anchor="middle" font-size="9" font-weight="bold" fill="#E65100" font-family="sans-serif">head</text>

  <!-- 节点20（新head） -->
  <rect x="646" y="102" width="115" height="46" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <line x1="718" y1="102" x2="718" y2="148" stroke="#2E7D32" stroke-width="1"/>
  <text x="682" y="120" text-anchor="middle" font-size="10" fill="#666" font-family="sans-serif">data</text>
  <text x="682" y="140" text-anchor="middle" font-size="12" font-weight="bold" fill="#2E7D32" font-family="sans-serif">20</text>
  <text x="776" y="120" text-anchor="middle" font-size="9" fill="#999" font-family="sans-serif">next</text>
  <text x="776" y="140" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">NULL</text>

  <text x="682" y="94" text-anchor="middle" font-size="9" fill="#2E7D32" font-family="sans-serif">新 head!</text>
  <line x1="636" y1="124" x2="643" y2="124" stroke="#2E7D32" stroke-width="2" marker-end="url(#a-g)"/>

  <text x="710" y="198" text-anchor="middle" font-size="11" font-weight="bold" fill="#2E7D32" font-family="sans-serif">head = temp</text>
  <text x="710" y="222" text-anchor="middle" font-size="9" fill="#555" font-family="sans-serif">temp 中存的地址还给 head</text>

  <rect x="640" y="245" width="140" height="36" rx="6" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="710" y="267" text-anchor="middle" font-size="10" fill="#2E7D32" font-family="sans-serif">20 成为新的头节点</text>

  <text x="710" y="308" text-anchor="middle" font-size="9" fill="#888" font-family="sans-serif">return temp ✓</text>
</svg>
