<svg width="520" height="250" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="eq-arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
  </defs>

  <text x="260" y="18" text-anchor="middle" font-size="13" font-weight="bold" fill="#333">链式队列入队 enqueue(q, 30) — 步骤图解</text>

  <!-- 入队前 -->
  <text x="140" y="42" text-anchor="middle" font-size="10" fill="#888">入队前</text>
  <rect x="20" y="55" width="80" height="40" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="60" y="80" text-anchor="middle" font-size="12" fill="#D32F2F">10</text>
  <rect x="130" y="55" width="80" height="40" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="170" y="80" text-anchor="middle" font-size="12" fill="#2E7D32">20</text>

  <text x="60" y="45" text-anchor="middle" font-size="9" fill="#D32F2F">front</text>
  <text x="170" y="45" text-anchor="middle" font-size="9" fill="#2E7D32">rear</text>
  <line x1="130" y1="75" x2="125" y2="75" stroke="#4A90D9" stroke-width="1.5"/>

  <!-- 箭头 -->
  <text x="240" y="82" text-anchor="middle" font-size="20" fill="#4A90D9">→</text>

  <!-- 入队后 -->
  <text x="395" y="42" text-anchor="middle" font-size="10" fill="#888">入队后</text>
  <rect x="290" y="55" width="80" height="40" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="330" y="80" text-anchor="middle" font-size="12" fill="#D32F2F">10</text>
  <rect x="400" y="55" width="80" height="40" rx="4" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="440" y="80" text-anchor="middle" font-size="12" fill="#333">20</text>
  <rect x="510" y="55" width="80" height="40" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="550" y="80" text-anchor="middle" font-size="12" fill="#2E7D32">30</text>

  <text x="330" y="45" text-anchor="middle" font-size="9" fill="#D32F2F">front</text>
  <text x="550" y="45" text-anchor="middle" font-size="9" fill="#2E7D32">rear</text>

  <line x1="400" y1="75" x2="395" y2="75" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="510" y1="75" x2="505" y2="75" stroke="#4A90D9" stroke-width="1.5"/>

  <text x="260" y="155" text-anchor="middle" font-size="11" fill="#333">步骤①：q→rear→next = newNode  (20指向30)</text>
  <text x="260" y="173" text-anchor="middle" font-size="11" fill="#333">步骤②：q→rear = newNode       (rear移到30)</text>

  <text x="260" y="210" text-anchor="middle" font-size="10" fill="#888">front 没有移动——仍然指向队首 10</text>
</svg>
