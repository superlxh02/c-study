<svg width="500" height="250" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="18" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">入栈 push(s, 40) — 步骤图解</text>

  <!-- 入栈前 -->
  <text x="160" y="42" text-anchor="middle" font-size="11" fill="#555">入栈前 top=2</text>
  <rect x="30" y="55" width="70" height="40" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="100" y="55" width="70" height="40" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="170" y="55" width="70" height="40" fill="#90CAF9" stroke="#0D47A1" stroke-width="2"/>
  <rect x="240" y="55" width="70" height="40" fill="#F5F5F5" stroke="#BDBDBD" stroke-width="1.5" stroke-dasharray="4,2"/>

  <text x="65" y="80" text-anchor="middle" font-size="13" fill="#333">10</text>
  <text x="135" y="80" text-anchor="middle" font-size="13" fill="#333">20</text>
  <text x="205" y="80" text-anchor="middle" font-size="13" fill="#0D47A1">30</text>
  <text x="275" y="67" text-anchor="middle" font-size="11" fill="#BDBDBD">空位</text>

  <!-- 箭头 -->
  <text x="360" y="90" text-anchor="middle" font-size="20" fill="#4A90D9">→</text>

  <!-- 入栈后 -->
  <text x="480" y="42" text-anchor="middle" font-size="11" fill="#555">入栈后 top=3</text>
  <rect x="340" y="55" width="70" height="40" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="410" y="55" width="70" height="40" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="480" y="55" width="70" height="40" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
  <rect x="550" y="55" width="70" height="40" fill="#90CAF9" stroke="#0D47A1" stroke-width="2"/>

  <text x="375" y="80" text-anchor="middle" font-size="13" fill="#333">10</text>
  <text x="445" y="80" text-anchor="middle" font-size="13" fill="#333">20</text>
  <text x="515" y="80" text-anchor="middle" font-size="13" fill="#333">30</text>
  <text x="585" y="80" text-anchor="middle" font-size="13" fill="#0D47A1">40</text>

  <text x="250" y="155" text-anchor="middle" font-size="12" fill="#333">步骤①：top = top + 1，top 从 2 变成 3</text>
  <text x="250" y="175" text-anchor="middle" font-size="12" fill="#333">步骤②：data[3] = 40，将新元素放入栈顶</text>

  <!-- 标注 -->
  <text x="585" y="42" text-anchor="middle" font-size="10" fill="#0D47A1">← top</text>
  <text x="205" y="42" text-anchor="middle" font-size="10" fill="#0D47A1">← top</text>
</svg>
