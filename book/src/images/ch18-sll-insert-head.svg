<svg width="680" height="320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr1" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4A90D9"/>
    </marker>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>

  <text x="340" y="20" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">头插法 — 插入前</text>

  <!-- head -->
  <rect x="20" y="40" width="50" height="60" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="45" y="75" text-anchor="middle" font-size="12" font-weight="bold" fill="#E65100">head</text>
  <line x1="70" y1="70" x2="110" y2="70" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr1)"/>

  <!-- 旧链表 -->
  <rect x="115" y="40" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="175" y="75" text-anchor="middle" font-size="13" fill="#333">10</text>
  <line x1="235" y1="70" x2="275" y2="70" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="280" y="40" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="340" y="75" text-anchor="middle" font-size="13" fill="#333">20</text>
  <text x="380" y="40" text-anchor="middle" font-size="10" fill="#888">NULL</text>

  <!-- 新节点 -->
  <rect x="450" y="40" width="120" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="510" y="75" text-anchor="middle" font-size="13" fill="#D32F2F">new: 5</text>

  <text x="510" y="30" text-anchor="middle" font-size="10" fill="#D32F2F">待插入的新节点</text>

  <!-- 分割线 -->
  <line x1="30" y1="155" x2="650" y2="155" stroke="#ccc" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="340" y="175" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">头插法 — 插入后</text>

  <!-- 新head -->
  <rect x="20" y="190" width="50" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="45" y="225" text-anchor="middle" font-size="12" font-weight="bold" fill="#D32F2F">head</text>
  <line x1="70" y1="220" x2="110" y2="220" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr2)"/>

  <!-- 新节点变为第一个 -->
  <rect x="115" y="190" width="120" height="60" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="175" y="225" text-anchor="middle" font-size="13" fill="#D32F2F">5</text>
  <line x1="235" y1="220" x2="275" y2="220" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="280" y="190" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="340" y="225" text-anchor="middle" font-size="13" fill="#333">10</text>
  <line x1="400" y1="220" x2="440" y2="220" stroke="#4A90D9" stroke-width="2" marker-end="url(#arr1)"/>

  <rect x="445" y="190" width="120" height="60" rx="6" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="505" y="225" text-anchor="middle" font-size="13" fill="#333">20</text>
  <text x="545" y="190" text-anchor="middle" font-size="10" fill="#888">NULL</text>

  <text x="340" y="300" text-anchor="middle" font-size="11" fill="#888">新节点 5 成为新的头节点，原来的链表接在后面</text>
</svg>
