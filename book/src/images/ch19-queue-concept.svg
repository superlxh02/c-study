<svg width="500" height="280" xmlns="http://www.w3.org/2000/svg">
  <text x="250" y="22" text-anchor="middle" font-size="14" font-weight="bold" fill="#333">队列的直观理解 — 像排队</text>

  <!-- 排队的人 -->
  <circle cx="80" cy="120" r="18" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="80" y="125" text-anchor="middle" font-size="11" fill="#333">4</text>

  <circle cx="140" cy="120" r="18" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="140" y="125" text-anchor="middle" font-size="11" fill="#333">3</text>

  <circle cx="200" cy="120" r="18" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="200" y="125" text-anchor="middle" font-size="11" fill="#333">2</text>

  <circle cx="260" cy="120" r="20" fill="#90CAF9" stroke="#0D47A1" stroke-width="2.5"/>
  <text x="260" y="125" text-anchor="middle" font-size="12" fill="#0D47A1">1</text>

  <!-- 入口和出口标注 -->
  <text x="330" y="110" font-size="12" fill="#2E7D32">← 新来的排这里</text>
  <text x="330" y="128" font-size="11" fill="#888">(入队 — 队尾)</text>

  <text x="20" y="110" font-size="12" fill="#D32F2F">这里离开 →</text>
  <text x="20" y="128" font-size="11" fill="#888">(出队 — 队首)</text>

  <!-- 箭头 -->
  <line x1="60" y1="85" x2="60" y2="105" stroke="#D32F2F" stroke-width="2"/>
  <line x1="310" y1="85" x2="310" y2="105" stroke="#2E7D32" stroke-width="2"/>

  <text x="250" y="200" text-anchor="middle" font-size="12" fill="#555">人①最早来，排在队首，最先离开</text>
  <text x="250" y="220" text-anchor="middle" font-size="12" fill="#555">人④最晚来，排在队尾，最后离开</text>
</svg>
